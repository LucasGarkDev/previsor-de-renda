services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: previsor_renda_backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "/"
    container_name: previsor_renda_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
